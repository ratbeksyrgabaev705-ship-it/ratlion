spring.application.name=ratlion-service

server.address=0.0.0.0
server.port=${PORT:8080}

# Локалдуу Docker volume же DATABASE_URL жок учур (fallback)
spring.datasource.url=jdbc:h2:file:/app/data/restaurantdb;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# PostgreSQL: USE_POSTGRES=true + DATABASE_URL коюлганда ProductionDatabaseConfig иштейт

spring.h2.console.enabled=false

spring.thymeleaf.cache=true

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.id=${TELEGRAM_CHAT_ID:}
telegram.manager.chat.id=${TELEGRAM_MANAGER_CHAT_ID:${TELEGRAM_CHAT_ID:}}

courier.default.phone=${COURIER_DEFAULT_PHONE:0990912913}
courier.default.name=${COURIER_DEFAULT_NAME:Сыргый}
courier.default.nickname=${COURIER_DEFAULT_NICKNAME:syrgy}
courier.default.password=${COURIER_DEFAULT_PASSWORD:ratlion123}

app.upload-dir=/app/data/uploads
