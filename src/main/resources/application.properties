spring.application.name=ratlion

spring.config.import=optional:file:./application-local.properties

server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:file:./data/restaurantdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ========== TELEGRAM ==========
# Локалдуу: IntelliJ Run → Environment variables коюңуз
# Серверде: Render Environment variables
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.id=${TELEGRAM_CHAT_ID:}
telegram.manager.chat.id=${TELEGRAM_MANAGER_CHAT_ID:${TELEGRAM_CHAT_ID:}}

