<!DOCTYPE html>
<html lang="ky" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${restaurantName}">BURGERMAN</title>
    <link rel="stylesheet" th:href="${customerCss}" href="/burger-men-customer.css">
    <script th:inline="javascript">
        window.RESTAURANT = {
            id: /*[[${restaurantId}]]*/ 3,
            slug: /*[[${restaurantSlug}]]*/ 'burger-men',
            name: /*[[${restaurantName}]]*/ 'BURGERMAN',
            base: /*[[${restaurantBase}]]*/ '/burger-men',
            address: /*[[${restaurantAddress}]]*/ 'Базар-Коргон'
        };
    </script>
    <script src="/restaurant-context.js"></script>
    <script src="/restaurant-i18n.js?v=3"></script>
</head>
<body th:class="${restaurantSlug == 'mburger' ? 'bm-body bm-body-mburger' : 'bm-body'}">

<div class="bm-page">
    <header class="bm-topbar">
        <div th:if="${restaurantSlug == 'mburger'}" class="bm-brand bm-brand-mburger">
            <img class="bm-brand-logo"
                 th:src="${restaurantLogo != null && !#strings.isEmpty(restaurantLogo) ? restaurantLogo : '/restaurant/mburger/logo.png?v=1'}"
                 th:alt="${restaurantName}"
                 src="/restaurant/mburger/logo.png?v=1"
                 alt="MBURGER">
        </div>
        <div th:unless="${restaurantSlug == 'mburger'}" class="bm-brand">
            <img th:if="${restaurantLogo != null && !#strings.isEmpty(restaurantLogo)}"
                 class="bm-brand-logo"
                 th:src="${restaurantLogo}"
                 th:alt="${restaurantName}"
                 alt="">
            <span th:unless="${restaurantLogo != null && !#strings.isEmpty(restaurantLogo)}"
                  class="bm-brand-icon">🍔</span>
            <div>
                <div class="bm-brand-title">
                    <span class="bm-burger">BURGER</span><span class="bm-man">MAN</span>
                </div>
                <div class="bm-brand-sub">BURGER HOUSE</div>
            </div>
        </div>
        <a id="topCartLink" class="bm-top-cart" href="#">
            <span class="bm-top-cart-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.17 14h9.66c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0020 5H5.21L4.27 2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42l.25-.46z"/></svg>
                <span id="topCartBadge" class="bm-top-cart-badge">0</span>
            </span>
            <span id="topCartSum" class="bm-top-cart-sum">0 сом</span>
        </a>
    </header>

    <div class="bm-lang-pill" id="customerLangPill">
        <button type="button" id="customerKyBtn" class="lang-opt active" onclick="CustomerI18n.setLang('ky')">KG</button>
        <span class="lang-sep">/</span>
        <button type="button" id="customerRuBtn" class="lang-opt" onclick="CustomerI18n.setLang('ru')">RU</button>
    </div>

    <section class="bm-promo">
        <div class="bm-promo-bg" id="promoBg"></div>
        <div class="bm-promo-overlay"></div>
        <img class="bm-promo-product" id="promoProduct" src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&q=80" alt="">
        <div class="bm-promo-content">
            <h2 id="promoTitle" class="bm-promo-title">Базар-Коргон шаарыбызды<br><em>даамдуу</em> кылалы!</h2>
            <p id="promoSub" class="bm-promo-sub">Жаңы бургерлер, тез жеткирүү — үйүңүзгө чейин.</p>
        </div>
        <div class="bm-promo-pills">
            <span class="bm-promo-pill">📍 <span id="promoCity">Базар-Коргон</span></span>
            <span class="bm-promo-pill">⏱ <span id="promoDelivery">30-60 мин</span></span>
        </div>
        <div class="bm-promo-dots"><span class="active"></span><span></span><span></span><span></span></div>
    </section>

    <nav id="categoryNav" class="bm-categories"></nav>

    <main id="menuArea" class="bm-menu">
        <div class="bm-empty">Меню жүктөлүп жатат...</div>
    </main>
</div>

<div id="bottomCart" class="bottom-cart">
    <div class="cart-summary">
        <div id="cartCount" class="cart-count">Себетте 0 товар</div>
        <div id="cartTotal" class="cart-total">0 сом</div>
    </div>
    <a id="openCartText" class="open-cart" th:href="${restaurantBase + '/cart'}" href="/burger-men/cart">Себетке өтүү →</a>
</div>

<nav class="bm-bottom-nav">
    <a class="bm-nav-item active" href="#" onclick="return false;">
        <span class="bm-nav-icon">🏠</span>
        <span id="navHomeLabel">Башкы бет</span>
    </a>
    <a id="navCartLink" class="bm-nav-item" href="#">
        <span class="bm-nav-icon">
            🛒
            <span id="navBadge" class="bm-nav-badge">0</span>
        </span>
        <span id="navCartLabel">Себет</span>
    </a>
</nav>

<div id="sheetOverlay" class="bm-overlay"></div>
<div id="productSheet" class="bm-sheet" onclick="event.stopPropagation()">
    <div class="bm-sheet-handle"></div>
    <button type="button" class="bm-sheet-close" onclick="closeSheet(true)" aria-label="Жабуу">✕</button>
    <div class="bm-sheet-body">
        <div id="sheetContent"></div>
    </div>
    <div id="sheetFooter" class="bm-sheet-footer">
        <button type="button" id="sheetAddBtn" class="bm-sheet-add">
            <span id="sheetAddLabel">Себетке кошуу</span>
            <span id="sheetAddPrice">0 сом</span>
        </button>
    </div>
</div>

<script>
    let allMenuItems = [];
    let selectedCat = 'all';
    let sheetItem = null;
    let sheetQty = 1;
    let sheetLockUntil = 0;

    const CAT_DEFS = [
        { key: 'all', i18n: 'catAll', match: () => true, icon: '🍽' },
        { key: 'burgers', i18n: 'catBurgers', match: c => /бургер|burger/i.test(c), icon: '🍔' },
        { key: 'combo', i18n: 'catCombo', match: c => /комбо|combo/i.test(c), icon: '🍟' },
        { key: 'shawarma', i18n: 'catShawarma', match: c => /шаурма|shaver/i.test(c), icon: '🌯' },
        { key: 'snacks', i18n: 'catSnacks', match: c => /снэк|закуск|картош|наггет|snack|fries/i.test(c), icon: '🍗' },
        { key: 'drinks', i18n: 'catDrinks', match: c => /суусундук|напит|cola|кола|drink/i.test(c), icon: '🥤' },
        { key: 'sauces', i18n: 'catSauces', match: c => /соус|sauce/i.test(c), icon: '🫙' }
    ];

    const TAG_CYCLE = ['hit', 'new', 'spicy'];

    function formatMoney(v) { return Number(v || 0).toLocaleString('ru-RU', { maximumFractionDigits: 0 }); }
    function formatQty(v) { return Math.max(0, Math.round(Number(v || 0))); }
    function escapeHtml(v) { return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function getName(item) { return CustomerI18n.getItemName(item) || 'Тамак'; }
    function getCategory(item) { return CustomerI18n.getCategory(item); }
    function getDesc(item) {
        const lang = CustomerI18n.getLang();
        if (lang === 'ru') {
            return item.descriptionRu || item.ingredientsRu || item.descriptionKg || item.ingredientsKg || '';
        }
        return item.descriptionKg || item.ingredientsKg || item.descriptionRu || item.ingredientsRu || '';
    }

    function getLongDescription(item) {
        const lang = CustomerI18n.getLang();
        if (lang === 'ru') {
            return item.descriptionRu || item.description || item.descriptionKg || '';
        }
        return item.descriptionKg || item.description || item.descriptionRu || '';
    }

    function getIngredientsList(item) {
        const lang = CustomerI18n.getLang();
        const raw = lang === 'ru'
            ? (item.ingredientsRu || item.ingredientsKg || item.ingredients || '')
            : (item.ingredientsKg || item.ingredientsRu || item.ingredients || '');
        if (raw && raw.length > 2) {
            return raw.split(/[,،;|]/).map(s => s.trim()).filter(s => s.length > 1);
        }
        const desc = getLongDescription(item);
        if (!desc) return [];
        return desc.split(/[,،;|]/).map(s => s.trim()).filter(s => s.length > 1).slice(0, 6);
    }

    function ingredientIconMarkup(name) {
        const n = name.toLowerCase();
        let svg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/></svg>';
        if (n.includes('булка') || n.includes('нан') || n.includes('тесто')) {
            svg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 14h16a2 2 0 002-2 6 6 0 00-6-6H8a6 6 0 00-6 6 2 2 0 002 2z"/></svg>';
        } else if (n.includes('эт') || n.includes('котлета') || n.includes('бекон') || n.includes('тоок') || n.includes('говя') || n.includes('кур')) {
            svg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>';
        } else if (n.includes('сыр') || n.includes('чеддер')) {
            svg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 14l4-8h8l4 8H4z"/><path d="M8 14v4M12 14v4M16 14v4"/></svg>';
        } else if (n.includes('салат') || n.includes('помидор') || n.includes('жашыл')) {
            svg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21V3M8 7l4-4 4 4M6 12l6-3 6 3"/></svg>';
        } else if (n.includes('соус') || n.includes('кетчуп') || n.includes('майонез')) {
            svg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="7"/><path d="M8 12h8"/></svg>';
        } else if (n.includes('картош') || n.includes('фри')) {
            svg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="5" width="14" height="14" rx="3"/></svg>';
        }
        return svg;
    }

    function renderIngredientChips(item) {
        const list = getIngredientsList(item);
        if (!list.length) return '';
        return `<div class="bm-composition"><h3>${escapeHtml(CustomerI18n.t('composition'))}</h3><div class="bm-chips">${list.map(name =>
            `<span class="bm-chip"><span class="bm-chip-icon">${ingredientIconMarkup(name)}</span><span class="bm-chip-text">${escapeHtml(name)}</span></span>`
        ).join('')}</div></div>`;
    }

    function getMenuItemKey(item) {
        return item.id != null ? 'menu-' + item.id : (item.nameKg || item.name || '');
    }

    function getCart() { return getStoredCart(); }
    function saveCart(c) {
        saveStoredCart(c);
        updateCartUi();
        if (!sheetItem) renderMenu();
    }

    function findCartItem(item) {
        return getCart().find(c => c.key === getMenuItemKey(item) || Number(c.itemId) === Number(item.id));
    }

    function getItemQty(item) {
        const ex = findCartItem(item);
        return ex ? Number(ex.quantity || 0) : 0;
    }

    function setItemQty(item, qty) {
        qty = formatQty(qty);
        let cart = getCart();
        const idx = cart.findIndex(c => c.key === getMenuItemKey(item) || Number(c.itemId) === Number(item.id));
        if (qty <= 0) {
            if (idx >= 0) cart.splice(idx, 1);
        } else if (idx >= 0) {
            cart[idx].quantity = qty;
        } else {
            cart.push({
                key: getMenuItemKey(item), itemId: item.id, name: getName(item),
                nameKg: item.nameKg || '', nameRu: item.nameRu || '',
                price: Number(item.price || 0), quantity: qty, image: item.image || ''
            });
        }
        saveCart(cart);
    }

    function resolveImage(item) {
        const raw = item.image ? String(item.image).trim() : '';
        if (!raw) return '';
        return raw.startsWith('http') || raw.startsWith('/') ? raw : '/' + raw;
    }

    function itemMatchesCat(item, catKey) {
        const cat = getCategory(item);
        const def = CAT_DEFS.find(d => d.key === catKey);
        return def ? def.match(cat) : true;
    }

    function itemsForCat(catKey) {
        return allMenuItems.filter(i => itemMatchesCat(i, catKey));
    }

    function isHomeView() {
        return selectedCat === 'all' || selectedCat === 'burgers' || selectedCat === 'combo' || selectedCat === 'shawarma';
    }

    function getTagHtml(item, index) {
        const name = (item.nameKg || item.name || '').toLowerCase();
        let type = TAG_CYCLE[index % 3];
        if (/ачуу|остр|spicy|diablo/i.test(name)) type = 'spicy';
        if (/жаңы|нов/i.test(name)) type = 'new';
        const labels = {
            hit: CustomerI18n.t('bmTagHit'),
            new: CustomerI18n.t('bmTagNew'),
            spicy: CustomerI18n.t('bmTagSpicy')
        };
        return `<span class="bm-tag bm-tag-${type}">${escapeHtml(labels[type])}</span>`;
    }

    function renderAction(item, id) {
        const qty = getItemQty(item);
        if (qty > 0) {
            return `<div class="bm-mini-counter" onclick="event.stopPropagation()"><button type="button" onclick="setItemQty(allMenuItems.find(m=>Number(m.id)===${id}), ${qty}-1)">−</button><span>${qty}</span><button type="button" onclick="setItemQty(allMenuItems.find(m=>Number(m.id)===${id}), ${qty}+1)">+</button></div>`;
        }
        return `<button type="button" class="bm-add-btn" onclick="event.stopPropagation(); setItemQty(allMenuItems.find(m=>Number(m.id)===${id}), 1)">+</button>`;
    }

    function renderPopularCard(item, index) {
        const id = Number(item.id);
        const img = resolveImage(item);
        const imgHtml = img
            ? `<img src="${escapeHtml(img)}" alt="" onerror="this.outerHTML='<div class=\\'bm-card-img-ph\\'>🍔</div>'">`
            : `<div class="bm-card-img-ph">🍔</div>`;
        return `<article class="bm-card" onclick="openSheet(${id}, event)">${getTagHtml(item, index)}<div class="bm-card-img-wrap">${imgHtml}</div><div class="bm-card-body"><div class="bm-card-name">${escapeHtml(getName(item))}</div><div class="bm-card-desc">${escapeHtml(getDesc(item))}</div><div class="bm-card-foot"><span class="bm-card-price">${formatMoney(item.price)} сом</span>${renderAction(item, id)}</div></div></article>`;
    }

    function renderComboCard(item) {
        const id = Number(item.id);
        const img = resolveImage(item);
        const imgHtml = img
            ? `<img class="bm-combo-img" src="${escapeHtml(img)}" alt="">`
            : `<div class="bm-combo-img bm-card-img-ph">🍟</div>`;
        return `<article class="bm-combo-card" onclick="openSheet(${id}, event)">${imgHtml}<div class="bm-combo-info"><div class="bm-card-name">${escapeHtml(getName(item))}</div><div class="bm-card-desc">${escapeHtml(getDesc(item))}</div><div class="bm-card-foot"><span class="bm-card-price">${formatMoney(item.price)} сом</span>${renderAction(item, id)}</div></div></article>`;
    }

    function renderCategorySection(titleKey, rowId, items, renderCard) {
        if (!items.length) return '';
        const viewAllFn = rowId === 'burgersScrollRow' ? 'viewAllBurgers(event)'
            : rowId === 'comboScrollRow' ? 'viewAllCombos(event)'
            : 'viewAllShawarma(event)';
        return `<section class="bm-section" id="${rowId}Section">
            <div class="bm-section-head">
                <h2>${escapeHtml(CustomerI18n.t(titleKey))}</h2>
                <button type="button" class="bm-section-link" onclick="${viewAllFn}">${escapeHtml(CustomerI18n.t('bmViewAll'))} ›</button>
            </div>
            <div id="${rowId}" class="bm-scroll-row">${items.map(renderCard).join('')}</div>
        </section>`;
    }

    function renderMenu() {
        const area = document.getElementById('menuArea');
        if (!allMenuItems.length) return;

        let html = '';

        if (isHomeView()) {
            const burgers = itemsForCat('burgers');
            const combos = itemsForCat('combo');
            const shawarma = itemsForCat('shawarma');
            html += renderCategorySection('catBurgers', 'burgersScrollRow', burgers, renderPopularCard);
            html += renderCategorySection('catCombo', 'comboScrollRow', combos, renderComboCard);
            html += renderCategorySection('catShawarma', 'shawarmaScrollRow', shawarma, renderPopularCard);
        } else {
            const def = CAT_DEFS.find(d => d.key === selectedCat);
            const items = itemsForCat(selectedCat);
            const titleKey = def ? def.i18n : 'catAll';
            const renderCard = selectedCat === 'combo' ? renderComboCard : renderPopularCard;
            if (items.length) {
                html += renderCategorySection(titleKey, selectedCat + 'ScrollRow', items, renderCard);
            }
        }

        if (!html) {
            area.innerHTML = `<div class="bm-empty"><h3>${escapeHtml(CustomerI18n.t('notFound'))}</h3></div>`;
            return;
        }

        area.innerHTML = html;
    }

    function renderCategories() {
        const nav = document.getElementById('categoryNav');
        nav.innerHTML = CAT_DEFS.filter(c => c.key !== 'all').map(cat => `
            <button type="button" class="bm-cat-btn ${selectedCat === cat.key ? 'active' : ''}" data-cat="${cat.key}" onclick="selectCategory('${cat.key}')">
                <span class="bm-cat-icon">${cat.icon}</span>
                <span class="bm-cat-label">${escapeHtml(CustomerI18n.t(cat.i18n))}</span>
            </button>
        `).join('');
    }

    function selectCategory(key) {
        selectedCat = key;
        renderCategories();
        renderMenu();
        if (key === 'burgers' || key === 'combo' || key === 'shawarma') {
            requestAnimationFrame(function () {
                const rowId = key === 'burgers' ? 'burgersScrollRow'
                    : key === 'combo' ? 'comboScrollRow'
                    : 'shawarmaScrollRow';
                document.getElementById(rowId + 'Section')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
        }
    }

    function scrollRowToEnd(rowId) {
        const row = document.getElementById(rowId);
        if (!row) return;
        row.scrollTo({
            left: Math.max(0, row.scrollWidth - row.clientWidth),
            behavior: 'smooth'
        });
    }

    function viewAllBurgers(event) {
        if (event) event.preventDefault();
        if (!isHomeView()) {
            selectedCat = 'all';
            renderCategories();
            renderMenu();
        }
        requestAnimationFrame(function () { scrollRowToEnd('burgersScrollRow'); });
    }

    function viewAllCombos(event) {
        if (event) event.preventDefault();
        if (!isHomeView()) {
            selectedCat = 'all';
            renderCategories();
            renderMenu();
        }
        requestAnimationFrame(function () { scrollRowToEnd('comboScrollRow'); });
    }

    function viewAllShawarma(event) {
        if (event) event.preventDefault();
        if (!isHomeView()) {
            selectedCat = 'all';
            renderCategories();
            renderMenu();
        }
        requestAnimationFrame(function () { scrollRowToEnd('shawarmaScrollRow'); });
    }

    function openSheet(itemId, event) {
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }
        sheetItem = allMenuItems.find(m => Number(m.id) === Number(itemId));
        if (!sheetItem) return;
        sheetQty = Math.max(1, getItemQty(sheetItem) || 1);
        sheetLockUntil = Date.now() + 500;
        renderSheet();
        document.body.classList.add('bm-sheet-open');
        document.getElementById('sheetOverlay').classList.add('open');
        document.getElementById('productSheet').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeSheet(force) {
        if (!force && Date.now() < sheetLockUntil) return;
        document.body.classList.remove('bm-sheet-open');
        document.getElementById('sheetOverlay').classList.remove('open');
        document.getElementById('productSheet').classList.remove('open');
        document.body.style.overflow = '';
        sheetItem = null;
        renderMenu();
    }

    function renderSheet() {
        if (!sheetItem) return;
        const img = resolveImage(sheetItem);
        const imgHtml = img
            ? `<img class="bm-sheet-img" src="${escapeHtml(img)}" alt="">`
            : `<div class="bm-sheet-img-ph">🍔</div>`;
        const chipsHtml = renderIngredientChips(sheetItem);
        const desc = getLongDescription(sheetItem) || getDesc(sheetItem);

        document.getElementById('sheetContent').innerHTML = `
            <div class="bm-sheet-top">
                ${imgHtml}
                <div class="bm-sheet-info">
                    <div class="bm-sheet-name">${escapeHtml(getName(sheetItem))}</div>
                    <div class="bm-sheet-desc">${escapeHtml(desc)}</div>
                    <div class="bm-sheet-price-row">
                        <div class="bm-sheet-price">${formatMoney(sheetItem.price)} <span>сом</span></div>
                        <div class="bm-sheet-counter">
                            <button type="button" class="bm-qty-minus" onclick="changeSheetQty(-1)">−</button>
                            <span id="sheetQty">${sheetQty}</span>
                            <button type="button" class="bm-qty-plus" onclick="changeSheetQty(1)">+</button>
                        </div>
                    </div>
                </div>
            </div>
            ${chipsHtml}
        `;
        document.getElementById('sheetAddPrice').textContent = formatMoney(Number(sheetItem.price) * sheetQty) + ' сом';
    }

    function changeSheetQty(d) {
        sheetQty = Math.max(1, sheetQty + d);
        renderSheet();
    }

    document.getElementById('sheetAddBtn').onclick = function (e) {
        e.stopPropagation();
        if (!sheetItem) return;
        setItemQty(sheetItem, sheetQty);
        sheetLockUntil = 0;
        closeSheet(true);
    };

    document.getElementById('sheetOverlay').addEventListener('click', function (e) {
        e.stopPropagation();
        closeSheet();
    });

    document.getElementById('sheetOverlay').addEventListener('touchend', function (e) {
        if (Date.now() < sheetLockUntil) {
            e.preventDefault();
            return;
        }
        e.stopPropagation();
        closeSheet();
    }, { passive: false });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && sheetItem) closeSheet(true);
    });

    function updateCartUi() {
        const cart = getCart();
        const count = cart.reduce((s, i) => s + Number(i.quantity || 0), 0);
        const total = cart.reduce((s, i) => s + Number(i.price || 0) * Number(i.quantity || 0), 0);
        document.getElementById('topCartSum').textContent = formatMoney(total) + ' сом';
        const badge = document.getElementById('topCartBadge');
        badge.textContent = count;
        badge.classList.toggle('show', count > 0);
        const nb = document.getElementById('navBadge');
        nb.textContent = count;
        nb.classList.toggle('show', count > 0);
        const bottomCart = document.getElementById('bottomCart');
        bottomCart.classList.toggle('show', count > 0);
        document.body.classList.toggle('bm-has-bottom-cart', count > 0);
        document.getElementById('cartCount').textContent =
            CustomerI18n.t('cartItems', { count });
        document.getElementById('cartTotal').textContent =
            formatMoney(total) + ' сом';
    }

    function applyLanguage() {
        const isMburger = window.restaurantSlug === 'mburger';
        document.getElementById('promoTitle').innerHTML = CustomerI18n.t(isMburger ? 'mbPromoTitle' : 'bmPromoTitle');
        document.getElementById('promoSub').textContent = CustomerI18n.t(isMburger ? 'mbPromoSub' : 'bmPromoSub');
        document.getElementById('promoDelivery').textContent = CustomerI18n.t('bmDelivery');
        document.getElementById('promoCity').textContent = window.RESTAURANT.address || 'Базар-Коргон';
        document.getElementById('openCartText').textContent = CustomerI18n.t('openCart');
        document.getElementById('navHomeLabel').textContent = CustomerI18n.t('bmHome');
        document.getElementById('navCartLabel').textContent = CustomerI18n.t('cart');
        document.getElementById('sheetAddLabel').textContent = CustomerI18n.t('addToCart');
        renderCategories();
        if (sheetItem) renderSheet();
        else renderMenu();
        updateCartUi();
    }

    const bannerUrl = /*[[${restaurantBanner}]]*/ 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=80';
    document.getElementById('promoBg').style.backgroundImage = "url('" + (bannerUrl || 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=80') + "')";

    CustomerI18n.onLanguageChange(applyLanguage);
    CustomerI18n.updatePillUi();
    applyLanguage();

    document.getElementById('topCartLink').href = rUrl('/cart');
    document.getElementById('navCartLink').href = rUrl('/cart');
    document.getElementById('openCartText').href = rUrl('/cart');

    fetch('/menu?restaurantId=' + encodeURIComponent(restaurantId))
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
            allMenuItems = Array.isArray(data) ? data : [];
            renderCategories();
            renderMenu();
            updateCartUi();
            const pendingItem = new URLSearchParams(location.search).get('item');
            if (pendingItem) {
                openSheet(Number(pendingItem));
                history.replaceState({}, '', rUrl('/'));
            }
        })
        .catch(() => {
            document.getElementById('menuArea').innerHTML = `<div class="bm-empty"><h3>${escapeHtml(CustomerI18n.t('menuError'))}</h3></div>`;
        });
</script>
</body>
</html>
