<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATLION — Менеджер</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        :root {
            --gold: #c9a227; --gold-dark: #a8861e; --dark: #1a1a1a;
            --muted: #777; --line: #ececec; --white: #fff; --bg: #f5f0e6;
            --green: #16a34a; --red: #dc2626;
        }
        body { background: var(--bg); color: var(--dark); min-height: 100vh; }
        button { cursor: pointer; font: inherit; }
        .header {
            position: sticky; top: 0; z-index: 10; padding: 16px 18px;
            background: #5c4a1f; color: white;
        }
        .header-title { font-size: 20px; font-weight: 900; }
        .header-subtitle { font-size: 11px; opacity: 0.85; margin-top: 3px; }
        .tabs {
            display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto;
            background: white; border-bottom: 1px solid var(--line);
        }
        .tab {
            padding: 10px 14px; border: none; border-radius: 999px;
            background: #f3f3f3; font-weight: 700; white-space: nowrap;
        }
        .tab.active { background: var(--gold); color: white; }
        .content { max-width: 900px; margin: 0 auto; padding: 16px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .card {
            background: white; border: 1px solid var(--line); border-radius: 16px;
            padding: 16px; margin-bottom: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.04);
        }
        .order-num { font-size: 22px; font-weight: 900; color: var(--gold-dark); }
        .row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 10px; font-size: 14px; }
        .receipt { width: 100%; max-height: 280px; object-fit: contain; border-radius: 12px; margin: 10px 0; }
        .actions { display: grid; gap: 8px; margin-top: 12px; }
        .btn {
            padding: 13px; border: none; border-radius: 12px;
            font-weight: 800; color: white;
        }
        .btn.green { background: var(--green); }
        .btn.red { background: var(--red); }
        .btn.gold { background: var(--gold-dark); }
        .badge { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; }
        .badge.ok { background: #dcfce7; color: #166534; }
        .badge.wait { background: #fef3c7; color: #92400e; }
        .form-grid { display: grid; gap: 10px; margin-top: 10px; }
        .input {
            width: 100%; padding: 12px; border: 1px solid var(--line);
            border-radius: 10px;
        }
        .summary-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px; margin-bottom: 14px;
        }
        .summary-card {
            background: white; border: 1px solid var(--line); border-radius: 14px;
            padding: 14px; text-align: center;
        }
        .summary-value { font-size: 22px; font-weight: 900; color: var(--gold-dark); }
        .summary-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
        .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
        .links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .link-btn {
            padding: 8px 12px; border-radius: 10px; background: white;
            border: 1px solid var(--line); text-decoration: none; color: var(--dark); font-size: 13px;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-title">RATLION — Менеджер</div>
    <div class="header-subtitle">Чек текшерүү · Отчёттор · Курьерлер</div>
    <div class="links">
        <a class="link-btn" href="/platform">Менин панелим</a>
        <a class="link-btn" href="/kitchen">Ашкана панели</a>
        <a class="link-btn" href="/courier">Курьер панели</a>
        <a class="link-btn" href="/admin-menu">Меню</a>
    </div>
</header>

<nav class="tabs">
    <button class="tab active" onclick="showTab('checks', this)">🧾 Чектер</button>
    <button class="tab" onclick="showTab('reports', this)">📊 Отчёттор</button>
    <button class="tab" onclick="showTab('couriers', this)">🛵 Курьерлер</button>
</nav>

<main class="content">
    <section id="checksScreen" class="screen active">
        <div id="newOrdersContainer"></div>
    </section>

    <section id="reportsScreen" class="screen">
        <div class="card">
            <div style="font-weight:900;margin-bottom:10px;">Бүгүнкү отчёт</div>
            <div id="reportSummary" class="summary-grid"></div>
            <button class="btn gold" onclick="loadTodayReport()">🔄 Жаңыртуу</button>
        </div>
        <div id="reportOrders"></div>
    </section>

    <section id="couriersScreen" class="screen">
        <div class="card">
            <div style="font-weight:900;margin-bottom:8px;">Жаңы курьер кошуу</div>
            <p style="font-size:13px;color:var(--muted);margin-bottom:10px;">
                Ботко /start жазыңыз → Telegram ID аласыз → бул жерге кошуп активдештиресиз.
            </p>
            <div class="form-grid">
                <input id="courierName" class="input" placeholder="Аты (мисалы: Азамат)">
                <input id="courierPhone" class="input" placeholder="Телефон (мисалы: 0990123456)" inputmode="tel">
                <input id="courierChatId" class="input" placeholder="Telegram ID (милдеттүү эмес)">
                <p style="font-size:12px;color:var(--muted);margin:8px 0">Телефон жазсаң — курьер /courier панелине өзү кирет</p>
                <button class="btn gold" onclick="addCourier()">Курьер кошуу</button>
            </div>
        </div>
        <div id="pendingCouriers"></div>
        <div id="activeCouriers"></div>
    </section>
</main>

<script>
    let currentTab = 'checks';

    function showTab(name, button) {
        currentTab = name;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        button.classList.add('active');
        document.getElementById(name + 'Screen').classList.add('active');
        refreshTab();
    }

    function refreshTab() {
        if (currentTab === 'checks') loadNewOrders();
        if (currentTab === 'reports') loadTodayReport();
        if (currentTab === 'couriers') loadCouriers();
    }

    async function loadNewOrders() {
        const container = document.getElementById('newOrdersContainer');
        try {
            const response = await fetch('/orders/new');
            const orders = await response.json();

            if (!orders.length) {
                container.innerHTML = '<div class="empty">🧾 Жаңы заказ жок</div>';
                return;
            }

            container.innerHTML = orders.map(order => {
                const hasReceipt = order.receiptImagePath
                    && order.receiptImagePath.startsWith('/uploads/');
                const receiptUrl = hasReceipt ? order.receiptImagePath : '';

                return `
                    <article class="card">
                        <div class="row">
                            <div class="order-num">№${escapeHtml(order.id)}</div>
                            <span class="badge ${hasReceipt ? 'ok' : 'wait'}">
                                ${hasReceipt ? '✅ Чек бар' : '⚠️ Чек жок'}
                            </span>
                        </div>
                        <div>👤 ${escapeHtml(order.customerName || '—')}</div>
                        <div>📞 ${escapeHtml(order.phone || '—')}</div>
                        <div>📍 ${escapeHtml(order.address || '—')}</div>
                        <div>🍽 ${escapeHtml(order.itemName || '—')}</div>
                        <div><strong>${money(order.totalPrice)} сом</strong></div>
                        ${hasReceipt ? `<a href="${receiptUrl}" target="_blank"><img class="receipt" src="${receiptUrl}" alt="Чек"></a>` : ''}
                        <div class="actions">
                            <button class="btn green" onclick="acceptOrder(${order.id})">
                                ✅ Кабыл алуу → Cafe
                            </button>
                            <button class="btn red" onclick="cancelOrder(${order.id})">
                                ✕ Четке кагуу
                            </button>
                        </div>
                    </article>
                `;
            }).join('');
        } catch (e) {
            container.innerHTML = '<div class="empty">Ката чыкты</div>';
        }
    }

    async function acceptOrder(id) {
        const response = await fetch('/orders/' + id + '/accept', { method: 'PUT' });
        if (response.ok) loadNewOrders();
    }

    async function cancelOrder(id) {
        if (!confirm('Четке кагасызбы?')) return;
        await fetch('/orders/' + id + '/cancel', { method: 'PUT' });
        loadNewOrders();
    }

    async function loadTodayReport() {
        try {
            const response = await fetch('/reports/today');
            const report = await response.json();

            document.getElementById('reportSummary').innerHTML = `
                <div class="summary-card">
                    <div class="summary-value">${report.totalOrders || 0}</div>
                    <div class="summary-label">Заказдар</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value">${money(report.totalRevenue)}</div>
                    <div class="summary-label">Сом</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value">${report.totalQuantity || 0}</div>
                    <div class="summary-label">Порция</div>
                </div>
            `;

            const orders = report.orders || [];
            document.getElementById('reportOrders').innerHTML = orders.length
                ? orders.map(o => `
                    <div class="card">
                        <div class="order-num">${escapeHtml(o.displayOrderNumber || ('№' + o.id))}</div>
                        <div>${escapeHtml(o.customerName || '—')} — ${money(o.totalPrice)} сом</div>
                    </div>
                `).join('')
                : '<div class="empty">Бүгүн заказ жок</div>';
        } catch (e) {
            document.getElementById('reportSummary').innerHTML = '';
            document.getElementById('reportOrders').innerHTML = '<div class="empty">Отчёт жүктөлбөдү</div>';
        }
    }

    async function loadCouriers() {
        try {
            const [allRes, pendingRes] = await Promise.all([
                fetch('/api/couriers'),
                fetch('/api/couriers/pending')
            ]);
            const all = await allRes.json();
            const pending = await pendingRes.json();
            const active = all.filter(c => c.active);

            document.getElementById('pendingCouriers').innerHTML = pending.length
                ? `<div style="font-weight:900;margin:12px 0 8px;">Күтүүдө (${pending.length})</div>`
                    + pending.map(c => courierCard(c, true)).join('')
                : '';

            document.getElementById('activeCouriers').innerHTML =
                `<div style="font-weight:900;margin:12px 0 8px;">Активдүү (${active.length})</div>`
                + (active.length
                    ? active.map(c => courierCard(c, false)).join('')
                    : '<div class="empty">Активдүү курьер жок</div>');
        } catch (e) {
            document.getElementById('activeCouriers').innerHTML = '<div class="empty">Ката</div>';
        }
    }

    function courierCard(courier, isPending) {
        return `
            <div class="card">
                <div><strong>${escapeHtml(courier.name)}</strong></div>
                <div style="font-size:13px;color:var(--muted);">ID: ${escapeHtml(courier.telegramChatId)}</div>
                ${courier.phone ? `<div style="font-size:13px;">📞 ${escapeHtml(courier.phone)}</div>` : ''}
                <div class="actions">
                    ${isPending ? `<button class="btn green" onclick="activateCourier(${courier.id})">Активдештир</button>` : ''}
                    ${!isPending ? `<button class="btn red" onclick="deactivateCourier(${courier.id})">Токтотуу</button>` : ''}
                </div>
            </div>
        `;
    }

    async function addCourier() {
        const name = document.getElementById('courierName').value.trim();
        const telegramChatId = document.getElementById('courierChatId').value.trim();
        const phone = document.getElementById('courierPhone').value.trim();

        if (!name) {
            alert('Атын жазыңыз');
            return;
        }
        if (!phone && !telegramChatId) {
            alert('Телефон же Telegram ID керек');
            return;
        }

        let response;
        if (phone) {
            response = await fetch('/api/couriers/register-phone', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone })
            });
        } else {
            response = await fetch('/api/couriers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, telegramChatId, phone, active: true })
            });
        }

        if (response.ok) {
            const saved = await response.json();
            document.getElementById('courierName').value = '';
            document.getElementById('courierChatId').value = '';
            document.getElementById('courierPhone').value = '';
            loadCouriers();
            alert('✅ ' + (saved.name || name) + ' катталды');
        } else {
            alert('Кошулбай калды — телефон кайталанган болушу мүмкүн');
        }
    }

    async function activateCourier(id) {
        await fetch('/api/couriers/' + id + '/activate', { method: 'PUT' });
        loadCouriers();
    }

    async function deactivateCourier(id) {
        await fetch('/api/couriers/' + id + '/deactivate', { method: 'PUT' });
        loadCouriers();
    }

    function money(v) {
        return Number(v || 0).toLocaleString('ky-KG', { maximumFractionDigits: 0 });
    }

    function escapeHtml(t) {
        return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadNewOrders();
    setInterval(() => { if (currentTab === 'checks') loadNewOrders(); }, 15000);
</script>
</body>
</html>
