<!DOCTYPE html>
<html lang="ky" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${restaurantName}">Себет</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <link rel="stylesheet" th:href="${customerCss}" href="/default-customer.css">
    <script th:inline="javascript">
        window.RESTAURANT = {
            id: /*[[${restaurantId}]]*/ null,
            slug: /*[[${restaurantSlug}]]*/ '',
            name: /*[[${restaurantName}]]*/ '',
            base: /*[[${restaurantBase}]]*/ '/'
        };
    </script>
    <script src="/restaurant-context.js"></script>
    <script src="/restaurant-i18n.js"></script>
    <style>
        body { padding-bottom: 130px; background: #faf6ee; }

        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            display: grid;
            grid-template-columns: 42px 1fr 42px;
            align-items: center;
            padding: 14px 16px;
            background: white;
            border-bottom: 1px solid var(--line);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: var(--gold);
            font-size: 24px;
            font-weight: 700;
        }

        .header-title {
            text-align: center;
            font-size: 18px;
            font-weight: 900;
        }

        .header-cart-icon {
            position: relative;
            text-align: center;
            font-size: 22px;
            color: var(--gold);
        }

        .header-badge {
            position: absolute;
            top: -4px;
            right: 0;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            background: var(--gold);
            color: white;
            font-size: 10px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content { padding: 14px 16px; }

        .cart-item {
            padding: 12px;
            margin-bottom: 12px;
            border-radius: var(--radius);
            background: white;
            box-shadow: var(--shadow);
        }

        .cart-item-main {
            display: grid;
            grid-template-columns: 88px 1fr;
            gap: 12px;
        }

        .item-image {
            width: 88px;
            height: 88px;
            border-radius: 12px;
            object-fit: cover;
            background: #ddd;
        }

        .item-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .item-name {
            font-size: 15px;
            font-weight: 900;
            line-height: 1.3;
        }

        .item-meta {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        .remove-btn {
            border: none;
            background: none;
            color: #ccc;
            font-size: 18px;
            padding: 0 4px;
        }

        .item-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .item-price {
            font-size: 16px;
            font-weight: 900;
            color: var(--gold);
        }

        .order-comment {
            margin-top: 8px;
            margin-bottom: 12px;
            padding: 16px;
            border-radius: var(--radius);
            background: white;
            box-shadow: var(--shadow);
        }

        .order-comment-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 800;
        }

        .order-comment-input {
            width: 100%;
            min-height: 72px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #fafafa;
            font-size: 14px;
            line-height: 1.45;
            resize: vertical;
            outline: none;
        }

        .order-comment-input:focus {
            border-color: var(--gold-light);
            background: #fff;
        }

        .order-comment-input::placeholder {
            color: #aaa;
        }

        .summary {
            margin-top: 8px;
            padding: 16px;
            border-radius: var(--radius);
            background: white;
            box-shadow: var(--shadow);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }

        .summary-total {
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--line);
            font-size: 18px;
            font-weight: 900;
        }

        .summary-total span:last-child {
            color: var(--gold);
            font-size: 22px;
        }

        .checkout-bar {
            position: fixed;
            bottom: 56px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            padding: 0 16px 12px;
        }

        .checkout-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state button {
            margin-top: 16px;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: var(--gold);
            color: white;
            font-weight: 800;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="page">
    <header class="header">
        <button type="button" class="back-btn" onclick="location.href=rUrl('/')">←</button>
        <div id="headerTitle" class="header-title">Себет</div>
        <div class="header-cart-icon">
            🛒
            <span id="headerBadge" class="header-badge">0</span>
        </div>
    </header>

    <main class="content">
        <div id="emptyState" class="empty-state hidden">
            <div style="font-size:48px;">🛒</div>
            <div id="emptyTitle" style="font-weight:900;margin-top:8px;">Себет бош</div>
            <div id="emptyText" style="margin-top:8px;font-size:14px;">Менюдан тамак тандаңыз</div>
            <button type="button" id="emptyMenuButton" onclick="location.href=rUrl('/')">Менюга кайтуу</button>
        </div>

        <div id="cartContent">
            <div id="cartItems"></div>
            <section id="orderCommentSection" class="order-comment">
                <label id="orderCommentLabel" class="order-comment-label" for="orderComment">Комментарий</label>
                <textarea
                        id="orderComment"
                        class="order-comment-input"
                        placeholder="Мисалы: пиязы аз, кок чоп жок кылып бериңиз"
                        oninput="updateOrderComment(this.value)"
                ></textarea>
            </section>
            <section class="summary">
                <div class="summary-row">
                    <span id="itemsCountLabel">Товарлар (0)</span>
                    <strong id="foodTotal">0 сом</strong>
                </div>
                <div class="summary-row">
                    <span id="deliveryLabel">Жеткируу акысы</span>
                    <strong id="deliveryFee">150 сом</strong>
                </div>
                <div class="summary-row summary-total">
                    <span id="totalPriceLabel">Жалпы сумма</span>
                    <span id="totalPrice">0 сом</span>
                </div>
            </section>
        </div>
    </main>
</div>

<div id="checkoutBar" class="checkout-bar">
    <button type="button" class="btn-gold checkout-btn" onclick="goToCheckout()">
        <span id="checkoutText">Заказду оформдоо</span> →
    </button>
</div>

<nav class="bottom-nav">
    <a th:href="${restaurantBase}" href="/" class="nav-item">
        <span class="nav-icon-wrap">🍴</span>
        <span id="navMenu">Меню</span>
    </a>
    <a th:href="${restaurantBase + '/cart'}" href="/cart" class="nav-item active">
        <span class="nav-icon-wrap">
            🛒
            <span id="navBadge" class="nav-badge">0</span>
        </span>
        <span id="navCart">Себет</span>
    </a>
</nav>

<script>
    let cart = (typeof getStoredCart === 'function' ? getStoredCart() : JSON.parse(localStorage.getItem("cart") || "[]"));
    cart = cart.map(i => ({
        ...i,
        quantity: Math.max(0, Math.round(Number(i.quantity || 0)))
    }))
        .filter(i => i.quantity > 0);
    localStorage.setItem(typeof cartStorageKey === 'function' ? cartStorageKey() : "cart", JSON.stringify(cart));

    let orderComment = (typeof getStoredComment === 'function' ? getStoredComment() : localStorage.getItem("orderComment")) || "";

    const DELIVERY_PRICE = 150;
    let currentLanguage = localStorage.getItem("customerLanguage") || "ky";

    const translations = {
        ky: {
            cart: "Себет", menu: "Меню", emptyCart: "Себет бош",
            emptyText: "Менюдан тамак тандаңыз.", backToMenu: "Менюга кайтуу",
            itemsCount: "Товарлар ({count})", delivery: "Жеткируу акысы",
            total: "Жалпы сумма", checkout: "Заказду оформдоо",
            emptyAlert: "Себет бош!", som: "сом", piece: "даана",
            orderComment: "Комментарий",
            commentPlaceholder: "Мисалы: пиязы аз, кок чоп жок кылып бериңиз"
        },
        ru: {
            cart: "Корзина", menu: "Меню", emptyCart: "Корзина пуста",
            emptyText: "Выберите блюда из меню.", backToMenu: "В меню",
            itemsCount: "Товарлар ({count})", delivery: "Доставка",
            total: "Итого", checkout: "Оформить заказ",
            emptyAlert: "Корзина пуста!", som: "сом", piece: "шт",
            orderComment: "Комментарий",
            commentPlaceholder: "Например: лук поменьше, без зелени"
        }
    };

    function t(k) { return translations[currentLanguage][k] || k; }

    function getCartItemName(item) {
        return currentLanguage === "ru"
            ? (item.nameRu || item.name || item.nameKg)
            : (item.nameKg || item.name || item.nameRu);
    }

    function applyLanguage() {
        document.documentElement.lang = currentLanguage === "ru" ? "ru" : "ky";
        document.title = window.RESTAURANT?.name || "";
        document.getElementById("headerTitle").textContent = t("cart");
        document.getElementById("emptyTitle").textContent = t("emptyCart");
        document.getElementById("emptyText").textContent = t("emptyText");
        document.getElementById("emptyMenuButton").textContent = t("backToMenu");
        document.getElementById("deliveryLabel").textContent = t("delivery");
        document.getElementById("totalPriceLabel").textContent = t("total");
        document.getElementById("checkoutText").textContent = t("checkout");
        document.getElementById("navMenu").textContent = t("menu");
        document.getElementById("navCart").textContent = t("cart");
        document.getElementById("orderCommentLabel").textContent = t("orderComment");
        document.getElementById("orderComment").placeholder = t("commentPlaceholder");
        if (window.CustomerI18n) CustomerI18n.updatePillUi();
    }

    CustomerI18n.mountLangPill();
    CustomerI18n.onLanguageChange(function (lang) {
        currentLanguage = lang;
        applyLanguage();
        renderCart();
    });
    applyLanguage();

    function saveCart() {
        if (typeof saveStoredCart === 'function') {
            saveStoredCart(cart);
        } else {
            localStorage.setItem("cart", JSON.stringify(cart));
        }
    }

    function renderCart() {
        const empty = document.getElementById("emptyState");
        const content = document.getElementById("cartContent");
        const checkoutBar = document.getElementById("checkoutBar");

        if (!cart.length) {
            content.classList.add("hidden");
            checkoutBar.classList.add("hidden");
            empty.classList.remove("hidden");
            document.getElementById("headerBadge").textContent = "0";
            document.getElementById("navBadge").textContent = "0";
            return;
        }

        content.classList.remove("hidden");
        checkoutBar.classList.remove("hidden");
        empty.classList.add("hidden");

        let html = "", foodTotal = 0, totalQty = 0;

        cart.forEach((item, index) => {
            const price = Number(item.price || 0);
            const qty = Math.max(0, Math.round(Number(item.quantity || 0)));
            const itemTotal = price * qty;
            const name = getCartItemName(item);
            totalQty += qty;
            foodTotal += itemTotal;

            const img = item.image
                ? `<img class="item-image" src="${escapeHtml(item.image)}" alt="">`
                : `<div class="item-image"></div>`;

            html += `
                <article class="cart-item">
                    <div class="cart-item-main">
                        ${img}
                        <div>
                            <div class="item-top">
                                <div>
                                    <div class="item-name">${escapeHtml(name)}</div>
                                    <div class="item-meta">${qty} ${t("piece")}</div>
                                </div>
                                <button type="button" class="remove-btn" onclick="removeItem(${index})">✕</button>
                            </div>
                            <div class="item-bottom">
                                <div class="item-price">${formatMoney(itemTotal)} ${t("som")}</div>
                                <div class="qty-control">
                                    <button type="button" onclick="decreaseItem(${index})">−</button>
                                    <span>${qty}</span>
                                    <button type="button" onclick="increaseItem(${index})">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>`;
        });

        document.getElementById("cartItems").innerHTML = html;
        document.getElementById("itemsCountLabel").textContent = t("itemsCount").replace("{count}", totalQty);
        document.getElementById("foodTotal").textContent = formatMoney(foodTotal) + " " + t("som");
        document.getElementById("totalPrice").textContent = formatMoney(foodTotal + DELIVERY_PRICE) + " " + t("som");
        document.getElementById("headerBadge").textContent = totalQty;
        document.getElementById("navBadge").textContent = totalQty;
    }

    function increaseItem(i) {
        cart[i].quantity = Math.max(0, cart[i].quantity + 1);
        saveCart(); renderCart();
    }

    function decreaseItem(i) {
        cart[i].quantity--;
        if (cart[i].quantity <= 0) cart.splice(i, 1);
        saveCart(); renderCart();
    }

    function removeItem(i) {
        cart.splice(i, 1);
        saveCart(); renderCart();
    }

    function updateOrderComment(value) {
        orderComment = String(value || "").trimStart();
        localStorage.setItem("orderComment", orderComment);
    }

    function goToCheckout() {
        if (!cart.length) { alert(t("emptyAlert")); return; }
        localStorage.setItem("orderComment", orderComment.trim());
        window.location.href = rUrl('/receipt');
    }

    function formatMoney(v) {
        return Number(v || 0).toLocaleString("ru-RU", { maximumFractionDigits: 0 });
    }

    function escapeHtml(v) {
        return String(v || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    applyLanguage();
    document.getElementById("orderComment").value = orderComment;
    renderCart();
</script>
</body>
</html>
